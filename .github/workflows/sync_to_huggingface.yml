name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install huggingface_hub
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 1. Create a fresh branch with ZERO history to completely bypass HF size limits
          git checkout --orphan hf_deploy
          
          # 2. Physically delete the massive datasets so they never reach Hugging Face
          rm -rf modules/MAtNODE/yoga16-dataset || true
          rm -rf modules/yoga16-dataset || true
          rm -rf yoga16-dataset || true
          
          # 3. Tell Git LFS to track all binary files so Hugging Face accepts them
          echo "*.png filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.jpg filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.jpeg filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.npy filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          
          # 4. Add clean files and commit
          # We MUST clear the git cache first so that the newly added .gitattributes actually applies to the files!
          git rm -rf --cached .
          git add .
          
          git commit -m "Automated Sync from GitHub Actions (LFS Cache Fixed)"
          
          # 5. Force push the clean snapshot to the Space
          git remote add space https://rashiniyasp:$HF_TOKEN@huggingface.co/spaces/rashiniyasp/yogaasanas-assistant
          git push --force space hf_deploy:main
