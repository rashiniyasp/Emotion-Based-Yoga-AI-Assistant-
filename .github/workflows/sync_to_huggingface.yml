name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install huggingface_hub
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # Strip massive datasets from the commit before pushing to Hugging Face
          git rm -r --cached modules/MAtNODE/yoga16-dataset yoga16-dataset || true
          git commit --amend -m "Clean commit for Hugging Face push" || true
          git remote add space https://rashiniyasp:$HF_TOKEN@huggingface.co/spaces/rashiniyasp/yogaasanas-assistant
          git push --force space main
